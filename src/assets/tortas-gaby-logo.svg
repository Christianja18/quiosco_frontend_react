    <text x="128" y="101" text-anchor="middle" fill="#cf3f68" stroke="#fff8ef" stroke-width="7" paint-order="stroke" font-family="Trebuchet MS, Segoe UI, sans-serif" font-size="58" font-weight="900" font-style="italic">Gaby</text>
